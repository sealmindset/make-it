# =============================================================================
# gitleaks -- Secret detection configuration
# =============================================================================
# Generated by /make-it scaffold (fastapi-nextjs)
#
# Pre-commit hook catches leaked secrets before they enter git history.
# Allowlist covers mock service tokens and .env.example placeholders.
# =============================================================================

title = "[APP_NAME] gitleaks config"

[allowlist]
  description = "Known-safe patterns for local development"
  paths = [
    '''\.env\.example$''',
    '''mock-services/''',
    '''scripts/seed-mock-services\.sh$''',
    '''tests/''',
  ]
  regexes = [
    '''mock-oidc-secret''',
    '''mock-oidc-client''',
    '''mock-jira-token''',
    '''mock-tempo-token''',
  ]
