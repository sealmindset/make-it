name: "[APP_SLUG] Quality Gate"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov

      - name: Ruff lint
        id: ruff_lint
        run: ruff check .
        continue-on-error: true

      - name: Ruff format check
        id: ruff_format
        run: ruff format --check .
        continue-on-error: true

      - name: mypy type check
        id: mypy
        run: mypy app/
        continue-on-error: true

      - name: pytest with coverage
        id: pytest
        run: pytest --cov --cov-report=json --cov-report=term -q
        continue-on-error: true

      - name: Write results
        if: always()
        run: |
          cat <<EOF > /tmp/python-results.json
          {
            "ruff_lint": "${{ steps.ruff_lint.outcome }}",
            "ruff_format": "${{ steps.ruff_format.outcome }}",
            "mypy": "${{ steps.mypy.outcome }}",
            "pytest": "${{ steps.pytest.outcome }}"
          }
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-results
          path: /tmp/python-results.json

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        id: eslint
        run: npx eslint .
        continue-on-error: true

      - name: Prettier check
        id: prettier
        run: npx prettier --check .
        continue-on-error: true

      - name: TypeScript type check
        id: tsc
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Write results
        if: always()
        run: |
          cat <<EOF > /tmp/frontend-results.json
          {
            "eslint": "${{ steps.eslint.outcome }}",
            "prettier": "${{ steps.prettier.outcome }}",
            "tsc": "${{ steps.tsc.outcome }}"
          }
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-results
          path: /tmp/frontend-results.json

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Install Node deps
        run: cd frontend && npm ci

      - name: gitleaks
        id: gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz" | tar xz
          ./gitleaks detect --config .gitleaks.toml --source . --no-banner
        continue-on-error: true

      - name: pip-audit
        id: pip_audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
        continue-on-error: true

      - name: npm audit
        id: npm_audit
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true

      - name: Trivy filesystem scan
        id: trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
        continue-on-error: true

      - name: Write results
        if: always()
        run: |
          cat <<EOF > /tmp/security-results.json
          {
            "gitleaks": "${{ steps.gitleaks.outcome }}",
            "pip_audit": "${{ steps.pip_audit.outcome }}",
            "npm_audit": "${{ steps.npm_audit.outcome }}",
            "trivy": "${{ steps.trivy.outcome }}"
          }
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-results
          path: /tmp/security-results.json

  attestation:
    name: Quality Attestation
    needs: [python-quality, frontend-quality, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/results

      - name: Generate attestation
        run: |
          PYTHON=$(cat /tmp/results/python-results/python-results.json)
          FRONTEND=$(cat /tmp/results/frontend-results/frontend-results.json)
          SECURITY=$(cat /tmp/results/security-results/security-results.json)

          ALL_PASS="pass"
          for outcome in $(echo "$PYTHON $FRONTEND $SECURITY" | jq -r 'to_entries[].value'); do
            if [ "$outcome" != "success" ]; then
              ALL_PASS="fail"
              break
            fi
          done

          jq -n \
            --arg app "[APP_SLUG]" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.head_ref }}" \
            --arg overall "$ALL_PASS" \
            --argjson python "$PYTHON" \
            --argjson frontend "$FRONTEND" \
            --argjson security "$SECURITY" \
            '{
              app: $app,
              timestamp: $ts,
              commit: $commit,
              branch: $branch,
              checks: {
                ruff_lint: $python.ruff_lint,
                ruff_format: $python.ruff_format,
                mypy: $python.mypy,
                pytest: $python.pytest,
                eslint: $frontend.eslint,
                prettier: $frontend.prettier,
                tsc: $frontend.tsc,
                gitleaks: $security.gitleaks,
                pip_audit: $security.pip_audit,
                npm_audit: $security.npm_audit,
                trivy: $security.trivy
              },
              overall: $overall,
              generated_by: "quality-gate.yml v1.0"
            }' > quality-gate-report.json

          echo "## Quality Gate Report" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat quality-gate-report.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report
          path: quality-gate-report.json
          retention-days: 90
