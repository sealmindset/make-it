# =============================================================================
# pyproject.toml -- Python Tool Configuration
# =============================================================================
# Generated by /make-it scaffold (fastapi-nextjs)
#
# All Python quality tool configuration lives here:
#   - Ruff (lint + format + security)
#   - mypy (type checking)
#   - pytest + coverage
#
# DevOps can override any setting. These are sensible defaults.
# =============================================================================

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["backend"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
    "S",   # flake8-bandit (security)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["S101"]   # allow assert in tests
"backend/alembic/*" = ["E501"] # migrations can have long lines

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
addopts = "--cov=backend/app --cov-report=term-missing --cov-report=html"

[tool.coverage.run]
source = ["backend/app"]
omit = ["*/tests/*", "*/alembic/*"]

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
