# =============================================================================
# Docker Compose -- [APP_NAME]
# =============================================================================
# Generated by /make-it scaffold (fastapi-nextjs)
#
# Usage:
#   docker compose --profile dev up --build
#
# Placeholders (replaced during /make-it build phase):
#   [APP_NAME]          - human-readable app name
#   [APP_SLUG]          - kebab-case app name (e.g., deliver-it)
#   [FRONTEND_PORT]     - host port for frontend (e.g., 3100)
#   [BACKEND_PORT]      - host port for backend (e.g., 8100)
#   [DB_PORT]           - host port for PostgreSQL (e.g., 5500)
#   [MOCK_OIDC_PORT]    - host port for mock-oidc (e.g., 10190)
#   [ADDITIONAL_SERVICE_URLS]    - extra env vars for integrations
#   [ADDITIONAL_MOCK_SERVICES]   - extra mock service definitions
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # Frontend (Next.js)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "[FRONTEND_PORT]:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Backend (FastAPI)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "[BACKEND_PORT]:8000"
    depends_on:
      db:
        condition: service_healthy
      mock-oidc:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://[APP_SLUG]:[APP_SLUG]@db:5432/[APP_SLUG]
      - OIDC_ISSUER_URL=http://mock-oidc:10090
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:[FRONTEND_PORT]
      - BACKEND_URL=http://localhost:[BACKEND_PORT]
      # [ADDITIONAL_SERVICE_URLS]
      # - JIRA_BASE_URL=http://mock-jira:8443
      # - JIRA_AUTH_TOKEN=mock-jira-token
      # - TEMPO_BASE_URL=http://mock-tempo:8444
      # - TEMPO_AUTH_TOKEN=mock-tempo-token
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Database (PostgreSQL)
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    ports:
      - "[DB_PORT]:5432"
    environment:
      - POSTGRES_USER=[APP_SLUG]
      - POSTGRES_PASSWORD=[APP_SLUG]
      - POSTGRES_DB=[APP_SLUG]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U [APP_SLUG]"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock OIDC Provider (local dev only)
  # --------------------------------------------------------------------------
  mock-oidc:
    build:
      context: ./mock-services/mock-oidc
      dockerfile: Dockerfile
    ports:
      - "[MOCK_OIDC_PORT]:10090"
    profiles:
      - dev
    environment:
      - MOCK_OIDC_PORT=10090
      - MOCK_OIDC_EXTERNAL_BASE_URL=http://localhost:[MOCK_OIDC_PORT]
      - MOCK_OIDC_INTERNAL_BASE_URL=http://mock-oidc:10090
      - MOCK_OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - MOCK_OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10090/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # [ADDITIONAL_MOCK_SERVICES]
  # --------------------------------------------------------------------------
  # Example: Mock Jira
  # --------------------------------------------------------------------------
  # mock-jira:
  #   build:
  #     context: ./mock-services/mock-jira
  #     dockerfile: Dockerfile
  #   ports:
  #     - "[MOCK_JIRA_PORT]:8443"
  #   profiles:
  #     - dev
  #   healthcheck:
  #     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8443/health"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   networks:
  #     - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
