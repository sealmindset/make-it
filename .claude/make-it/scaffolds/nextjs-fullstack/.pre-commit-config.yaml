# =============================================================================
# Pre-commit hooks -- Code quality gates on every commit
# =============================================================================
# Generated by /make-it scaffold (nextjs-fullstack)
#
# Install: pre-commit install
# Run all: pre-commit run --all-files
# Update:  pre-commit autoupdate
# =============================================================================

repos:
  # -------------------------------------------------------------------------
  # General file hygiene
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      # Commit discipline: never commit to the default branch. Feature work
      # happens on a branch (ideally a worktree -- see scripts/worktree.sh).
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

  # -------------------------------------------------------------------------
  # TypeScript / JavaScript -- ESLint + Prettier
  # -------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint --max-warnings 0 .
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: npx prettier --check .
        language: system
        types_or: [javascript, jsx, ts, tsx, css, json]
        pass_filenames: false

  # -------------------------------------------------------------------------
  # Secret detection -- gitleaks
  # -------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
